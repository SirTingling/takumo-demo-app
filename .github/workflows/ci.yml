name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk_live_\|sk_test_51\|whsec_\|password.*=.*['\"].*[a-zA-Z0-9]" src/ --include="*.ts"; then
            echo "::error::Hardcoded secrets detected in source code"
            exit 1
          fi
          echo "No hardcoded secrets found"
